<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us - University Admission</title>
    <link rel="stylesheet" href="contact.css">
</head>
<body>

<!-- Navbar -->
<nav>
    <h2>Malolos University</h2>
</nav>

<!-- Header -->
<section class="contact-header">
    <h1>Contact Us</h1>
    <p>We’re here to help you with your admission inquiries</p>
</section>

<!-- Contact Section -->
<section class="contact-container">

    <!-- Contact Info -->
    <div class="contact-info">
        <h2>Get in Touch</h2>
        <p><strong>Email:</strong> malolosuniversity@gmail.com</p>
        <p><strong>Phone:</strong> 09461770311</p>
        <p><strong>Office Hours:</strong> Monday - Friday, 8:00 AM - 5:00 PM</p>
    </div>

    <!-- Contact Form -->
    <div class="contact-form">
        <h2>Send a Message</h2>
        <form>
            <label>Full Name</label>
            <input type="text" required>

            <label>Email</label>
            <input type="email" required>

            <label>Message</label>
            <textarea required></textarea>

            <button type="submit">Send Message</button>
        </form>
    </div>

</section>

<!-- Footer -->
<footer>
    <p>© 2026 Malolos University | All Rights Reserved</p>
</footer>

</body>
</html>
