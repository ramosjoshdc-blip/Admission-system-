<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
          <link rel="stylesheet" href="forgot password.css">
    <title>Forgot Password</title>

</head>
<body>
    <div class="panel1">
        <h1>Forgot Password</h1>
        <h3>Reset your password</h3>
    </div>
    <div class="panel2">
        <input type="text" id="username" placeholder="Username (optional)">
        <input type="email" id="email" placeholder="Email" required>
        
        <button id="resetBtn">Send Reset Link</button>
        
        <p>Already have an account? <span class="link-text" onclick="window.location.href='sign in.html'">Sign In</span></p>
    </div>

    <script>
        const resetBtn = document.getElementById("resetBtn");
        let users = JSON.parse(localStorage.getItem("users")) || [];

        resetBtn.addEventListener("click", () => {
            const username = document.getElementById("username").value.trim();
            const email = document.getElementById("email").value.trim();

            if(email === ""){
                alert("Please enter your Email address!");
                return;
            }

            const foundUser = users.find(u => 
                u.email === email && (username === "" || u.username === username)
            );

            if(foundUser){
                alert(`Reset link sent to ${email}!`);
                window.location.href = "sign in.html";
            } else {
                alert("No account found with this Email and Username combination!");
            }
        });
    </script>
</body>
</html>
